syntax = "proto3";

package angel.game_world;

message MovementFragment {
  int32 x = 1;
  int32 y = 2;
  int32 next_x = 3;
  int32 next_y = 4;
  int32 duration = 5;
}

message SceneObjectState {
  uint64 object_id = 1;
  int32 x = 2;
  int32 y = 3;
}

message EnterSceneRequest {
  SceneObjectState object = 1;
}

message MoveSceneRequest {
  uint64 object_id = 1;
  MovementFragment movement = 2;
}

message LeaveSceneRequest {
  uint64 object_id = 1;
}

message AoiVisibleList {
  uint64 object_id = 1;
  repeated uint64 visible_object_ids = 2;
}
